    <script>
    (function() {
        var params = new URLSearchParams(window.location.search);
        var payData = params.get("p");
        if (!payData) {
            return;
        }

        document.documentElement.className = "pay-mode";
        try {
            var data = JSON.parse(decodeURIComponent(escape(atob(payData))));
            var userAgent = navigator.userAgent;
            if (/Alipay/i.test(userAgent)) {
                window.location.replace(data.aliUrl);
                return;
            }
            if (/MicroMessenger\//i.test(userAgent)) {
                if (/^https?:\/\//i.test(data.wechatUrl)) {
                    window.location.replace(data.wechatUrl);
                    return;
                }
                window.__wechatNativeCode = data.wechatUrl;
                window.__paymentMessage = "请识别下方微信收款码完成付款。";
                return;
            }
            window.__paymentMessage = "请使用微信或支付宝扫码打开当前页面。";
        } catch (error) {
            window.__paymentMessage = "收款码链接无效。";
        }
    })();
    </script>

    <script>
    if (document.documentElement.className !== "pay-mode") {
        document.write('<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"><\/script>');
    }
    document.write('<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"><\/script>');
    </script>
    <script>
    function renderQrToElement(target, text) {
        if (typeof window.QRCode !== "function") {
            throw new Error("QRCode library unavailable");
        }
        target.innerHTML = "";
        new QRCode(target, {
            text: text,
            width: 640,
            height: 640,
            colorDark: "#17202a",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.M
        });
        setTimeout(function() {
            var canvas = target.querySelector("canvas");
            if (!canvas) {
                return;
            }
            var image = document.createElement("img");
            image.src = canvas.toDataURL("image/png");
            image.alt = "收款二维码";
            target.innerHTML = "";
            target.appendChild(image);
        }, 0);
    }

    if (document.documentElement.className === "pay-mode") {
        if (window.__wechatNativeCode) {
            document.body.innerHTML = '<div class="native-pay"><div class="native-card"><div class="native-card-header"><div class="icon">💰</div><h1>微信收款码</h1></div><div class="native-card-body"><div id="native-wechat-qr"></div><div class="pay-tips">💡 长按二维码图片，选择识别图中二维码完成付款</div></div></div></div>';
            renderQrToElement(document.getElementById("native-wechat-qr"), window.__wechatNativeCode);
        } else {
            document.body.innerHTML = '<div class="native-pay"><div class="native-card"><div class="native-card-header"><div class="icon">📱</div><h1>正在进入支付页面...</h1></div><div class="native-card-body"><div class="pay-tips">' + (window.__paymentMessage || "正在进入支付页面...") + '</div></div></div></div>';
        }
    } else {

    var payment = {
        ali: "",
        wechat: ""
    };

    var elements = {
        aliFile: document.getElementById("ali-file"),
        wechatFile: document.getElementById("wechat-file"),
        aliPreview: document.getElementById("ali-preview"),
        wechatPreview: document.getElementById("wechat-preview"),
        aliStatus: document.getElementById("ali-status"),
        wechatStatus: document.getElementById("wechat-status"),
        aliManual: document.getElementById("ali-manual"),
        wechatManual: document.getElementById("wechat-manual"),
        aliText: document.getElementById("ali-text"),
        wechatText: document.getElementById("wechat-text"),
        generate: document.getElementById("generate"),
        result: document.getElementById("result"),
        comboCard: document.getElementById("combo-card"),
        combinedQr: document.getElementById("combined-qr")
    };

    elements.aliFile.addEventListener("change", function(event) {
        handleFile(event.target.files[0], "ali");
    });

    elements.wechatFile.addEventListener("change", function(event) {
        handleFile(event.target.files[0], "wechat");
    });

    elements.aliText.addEventListener("input", function() {
        payment.ali = elements.aliText.value.trim();
        updateButtons();
    });

    elements.wechatText.addEventListener("input", function() {
        payment.wechat = elements.wechatText.value.trim();
        updateButtons();
    });

    elements.generate.addEventListener("click", function() {
        renderCombinedQr().then(function(message) {
            elements.comboCard.style.display = "block";
            elements.result.innerHTML = message;
        }).catch(function() {
            elements.comboCard.style.display = "none";
            elements.result.innerHTML = "二维码生成失败，请刷新页面后重试。";
        });
    });

    function handleFile(file, channel) {
        if (!file) {
            return;
        }

        var preview = channel === "ali" ? elements.aliPreview : elements.wechatPreview;
        var status = channel === "ali" ? elements.aliStatus : elements.wechatStatus;
        var manual = channel === "ali" ? elements.aliManual : elements.wechatManual;
        var text = channel === "ali" ? elements.aliText : elements.wechatText;
        var reader = new FileReader();

        status.innerHTML = "正在读取图片...";
        reader.onload = function() {
            preview.src = reader.result;
            preview.style.display = "block";
            decodeImage(reader.result, channel).then(function(value) {
                payment[channel] = value;
                text.value = value;
                manual.style.display = "block";
                status.innerHTML = getChannelName(channel) + "二维码识别成功。";
                updateButtons();
            }).catch(function(error) {
                payment[channel] = "";
                text.value = "";
                manual.style.display = "block";
                status.innerHTML = error.message + " 可以在下方手动粘贴二维码内容。";
                updateButtons();
            });
        };
        reader.readAsDataURL(file);
    }

    function decodeImage(src, channel) {
        return new Promise(function(resolve, reject) {
            var image = new Image();
            image.onload = function() {
                decodeWithBarcodeDetector(image).catch(function() {
                    return decodeWithJsQr(image);
                }).then(function(value) {
                    var detectedChannel = detectChannel(value);
                    if (detectedChannel && detectedChannel !== channel) {
                        reject(new Error("这张图片识别为" + getChannelName(detectedChannel) + "收款码。"));
                        return;
                    }
                    if (!value) {
                        reject(new Error("图片中没有识别到二维码。"));
                        return;
                    }
                    resolve(value);
                }).catch(function() {
                    reject(new Error("二维码识别失败。"));
                });
            };
            image.onerror = function() {
                reject(new Error("图片加载失败。"));
            };
            image.src = src;
        });
    }

    function decodeWithBarcodeDetector(image) {
        return new Promise(function(resolve, reject) {
            if (!("BarcodeDetector" in window)) {
                reject(new Error("BarcodeDetector unavailable"));
                return;
            }
            var detector = new BarcodeDetector({ formats: ["qr_code"] });
            detector.detect(image).then(function(codes) {
                if (!codes.length) {
                    reject(new Error("No barcode"));
                    return;
                }
                resolve(codes[0].rawValue.trim());
            }).catch(reject);
        });
    }

    function decodeWithJsQr(image) {
        return new Promise(function(resolve, reject) {
            if (typeof jsQR !== "function") {
                reject(new Error("jsQR unavailable"));
                return;
            }

            var canvas = document.createElement("canvas");
            var context = canvas.getContext("2d", { willReadFrequently: true });
            canvas.width = image.naturalWidth || image.width;
            canvas.height = image.naturalHeight || image.height;
            context.drawImage(image, 0, 0, canvas.width, canvas.height);

            var imageData = context.getImageData(0, 0, canvas.width, canvas.height);
            var code = jsQR(imageData.data, imageData.width, imageData.height);
            if (!code || !code.data) {
                reject(new Error("No QR code"));
                return;
            }
            resolve(code.data.trim());
        });
    }

    function detectChannel(value) {
        var lower = value.toLowerCase();
        if (lower.indexOf("alipay") !== -1 || lower.indexOf("qr.alipay.com") !== -1) {
            return "ali";
        }
        if (lower.indexOf("wechatpay") !== -1 || lower.indexOf("wxp://") === 0 || lower.indexOf("weixin") !== -1) {
            return "wechat";
        }
        return "";
    }

    function getChannelName(channel) {
        return channel === "ali" ? "支付宝" : "微信";
    }

    function updateButtons() {
        elements.comboCard.style.display = "none";
        elements.generate.disabled = !(payment.ali && payment.wechat);
        if (payment.ali && payment.wechat) {
            if (isWechatNativeCode(payment.wechat)) {
                elements.result.innerHTML = "两张收款码已就绪，可以生成物理合并版二合一码。";
            } else {
                elements.result.innerHTML = "两张收款码已就绪，可以生成二合一收款页面。";
            }
        }
    }

    function buildShareUrl(aliUrl, wechatUrl) {
        var data = JSON.stringify({ aliUrl: aliUrl, wechatUrl: wechatUrl });
        var encoded = btoa(unescape(encodeURIComponent(data)));
        return window.location.origin + window.location.pathname + "?p=" + encodeURIComponent(encoded);
    }

    function renderCombinedQr() {
        if (isWechatNativeCode(payment.wechat)) {
            return renderPhysicalCombinedQr(payment.ali, payment.wechat).then(function() {
                return "已生成物理合并版二合一码。请直接用微信或支付宝扫码测试。";
            });
        }

        return new Promise(function(resolve) {
            var shareUrl = buildShareUrl(payment.ali, payment.wechat);
            renderQrToElement(elements.combinedQr, shareUrl);
            resolve("已生成二合一收款二维码。用微信或支付宝扫码即可自动进入对应收款页。");
        });
    }

    function isWechatNativeCode(value) {
        return value.toLowerCase().indexOf("wxp://") === 0;
    }

    function renderPhysicalCombinedQr(aliUrl, wechatUrl) {
        return Promise.all([
            createQrCanvas(wechatUrl, { size: 640, level: QRCode.CorrectLevel.H }),
            createQrCanvas(aliUrl, { size: 640, level: QRCode.CorrectLevel.H })
        ]).then(function(canvases) {
            var wechatCanvas = canvases[0];
            var aliCanvas = canvases[1];
            var aliProcessed = processAlipayOverlay(aliCanvas);
            var merged = mergeQrCanvases(wechatCanvas, aliProcessed);
            elements.combinedQr.innerHTML = "";
            elements.combinedQr.appendChild(canvasToImage(merged));
        });
    }

    function createQrCanvas(text, options) {
        return new Promise(function(resolve, reject) {
            if (typeof window.QRCode !== "function") {
                reject(new Error("QRCode library unavailable"));
                return;
            }
            var holder = document.createElement("div");
            holder.style.position = "fixed";
            holder.style.left = "-9999px";
            holder.style.top = "-9999px";
            document.body.appendChild(holder);
            new QRCode(holder, {
                text: text,
                width: options.size,
                height: options.size,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: options.level
            });
            setTimeout(function() {
                var source = holder.querySelector("canvas") || holder.querySelector("img");
                if (!source) {
                    holder.remove();
                    reject(new Error("QR canvas unavailable"));
                    return;
                }
                copyQrSourceToCanvas(source, options.size).then(function(canvas) {
                    holder.remove();
                    resolve(canvas);
                }).catch(function(error) {
                    holder.remove();
                    reject(error);
                });
            }, 0);
        });
    }

    function copyQrSourceToCanvas(source, size) {
        return new Promise(function(resolve, reject) {
            var canvas = document.createElement("canvas");
            var context = canvas.getContext("2d");
            canvas.width = size;
            canvas.height = size;
            context.fillStyle = "#ffffff";
            context.fillRect(0, 0, size, size);

            if (source.tagName === "CANVAS") {
                context.drawImage(source, 0, 0, size, size);
                resolve(canvas);
                return;
            }

            var image = new Image();
            image.onload = function() {
                context.drawImage(image, 0, 0, size, size);
                resolve(canvas);
            };
            image.onerror = function() {
                reject(new Error("QR image load failed"));
            };
            image.src = source.src;
        });
    }

    function processAlipayOverlay(canvas) {
        var prepared = document.createElement("canvas");
        var preparedContext = prepared.getContext("2d");
        var processed = document.createElement("canvas");
        var context = processed.getContext("2d");
        var size = canvas.width;
        var clearSize = Math.round(size * 0.18);
        prepared.width = size;
        prepared.height = size;
        preparedContext.fillStyle = "#ffffff";
        preparedContext.fillRect(0, 0, size, size);
        preparedContext.drawImage(canvas, 0, 0, size, size);
        preparedContext.clearRect(size - clearSize, size - clearSize, clearSize, clearSize);
        processed.width = size;
        processed.height = size;
        context.fillStyle = "#ffffff";
        context.fillRect(0, 0, size, size);
        context.translate(size / 2, size / 2);
        context.rotate(Math.PI);
        context.drawImage(prepared, -size / 2, -size / 2, size, size);
        return processed;
    }

    function mergeQrCanvases(wechatCanvas, aliCanvas) {
        var merged = document.createElement("canvas");
        var context = merged.getContext("2d");
        var size = wechatCanvas.width;
        var overlaySize = Math.round(size * 0.5);
        var offset = size - overlaySize;
        merged.width = size;
        merged.height = size;
        context.fillStyle = "#ffffff";
        context.fillRect(0, 0, size, size);
        context.drawImage(wechatCanvas, 0, 0, size, size);
        context.drawImage(aliCanvas, offset, offset, overlaySize, overlaySize);
        return merged;
    }

    function canvasToImage(canvas) {
        var image = document.createElement("img");
        image.src = canvas.toDataURL("image/png");
        image.alt = "二合一收款码";
        return image;
    }

    }

    </script>
</body>
